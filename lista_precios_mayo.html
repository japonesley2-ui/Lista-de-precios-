<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;

    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #666666;
    --tag: #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 60px 48px 50px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    background: linear-gradient(135deg, #0f0f0f 0%, #141414 100%);
  }
  header::before {
    content: 'MAYO';
    position: absolute;
    right: -10px;
    top: -18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    color: rgba(200,241,53,0.04);
    letter-spacing: -4px;
    pointer-events: none;
    user-select: none;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .header-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: #0a0a0a;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 6vw, 88px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--text);
    margin-bottom: 14px;
  }
  header h1 span { color: var(--accent); }
  .header-meta {
    display: flex;
    gap: 32px;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .header-meta span { color: var(--text); }

  /* ── SEARCH / NAV ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 380px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px 9px 36px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }

  .brands-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .brands-nav::-webkit-scrollbar { display: none; }
  .nav-chip {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-chip:hover, .nav-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0a;
  }

  /* ── MAIN ── */
  main { padding: 0 48px 80px; }

  /* ── BRAND SECTION ── */
  .brand-section {
    margin-top: 48px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .brand-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── CATEGORY ── */
  .category-block {
    margin-bottom: 28px;
  }
  .category-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* ── PRODUCT TABLE ── */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .product-row {
    display: contents;
  }
  .product-row:not(:last-child) .product-name,
  .product-row:not(:last-child) .product-price {
    border-bottom: 1px solid var(--border);
  }
  .product-name, .product-price {
    padding: 9px 14px;
    background: var(--surface);
    transition: background 0.12s;
  }
  .product-row:hover .product-name,
  .product-row:hover .product-price {
    background: var(--surface2);
  }
  .product-name {
    font-size: 12.5px;
    font-weight: 400;
    color: #cccccc;
    letter-spacing: 0.01em;
    border-right: 1px solid var(--border);
  }
  .product-name .badge-oferta {
    display: inline-block;
    background: var(--accent2);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: middle;
    text-transform: uppercase;
  }
  .product-name .badge-hs {
    display: inline-block;
    background: #2a2a00;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .product-price {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
    text-align: right;
  }

  /* ── DIVIDER SECTION HEADER (subcategories) ── */
  .sub-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 20px 0 10px;
    padding-left: 2px;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── NO RESULTS ── */
  #noResults {
    display: none;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    header, .controls, main, footer { padding-left: 20px; padding-right: 20px; }
    header::before { font-size: 120px; }
  }
</style>
</head>

// ── Build navigation ──
const nav = document.getElementById('brandsNav');
data.forEach(b => {
  const chip = document.createElement('button');
  chip.className = 'nav-chip';
  chip.textContent = b.brand;
  chip.onclick = () => {
    document.getElementById('brand-' + b.brand.replace(/[^a-zA-Z0-9]/g,'_')).scrollIntoView({behavior:'smooth', block:'start'});
    document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  };
  nav.appendChild(chip);
});

// ── Render content ──
const main = document.getElementById('mainContent');

function renderAll(filter = '') {
  main.innerHTML = '';
  let totalVisible = 0;

  data.forEach(brand => {
    const brandEl = document.createElement('section');
    brandEl.className = 'brand-section';
    brandEl.id = 'brand-' + brand.brand.replace(/[^a-zA-Z0-9]/g,'_');

    let brandHtml = '';
    let brandCount = 0;
    let catHtml = '';

    brand.categories.forEach(cat => {
      const visProducts = cat.products.filter(p =>
        !filter || p.name.toLowerCase().includes(filter) || brand.brand.toLowerCase().includes(filter) || cat.name.toLowerCase().includes(filter)
      );
      if (!visProducts.length) return;
      brandCount += visProducts.length;

      catHtml += `<div class="category-block">
        <div class="category-label">${cat.name}</div>
        <div class="product-grid">`;

      visProducts.forEach(p => {
        const badges = (p.oferta ? '<span class="badge-oferta">Oferta</span>' : '') + (p.hs ? '<span class="badge-hs">HS</span>' : '');
        catHtml += `<div class="product-row">
          <div class="product-name">${p.name}${badges}</div>
          <div class="product-price">${p.price}</div>
        </div>`;
      });

      catHtml += `</div></div>`;
    });

    if (!brandCount) return;
    totalVisible += brandCount;

    brandHtml = `<div class="brand-header">
      <div class="brand-name">${brand.brand}</div>
      <div class="brand-count">${brandCount} producto${brandCount !== 1 ? 's' : ''}</div>
    </div>${catHtml}`;

    brandEl.innerHTML = brandHtml;
    main.appendChild(brandEl);
  });

  document.getElementById('noResults').style.display = totalVisible === 0 ? 'block' : 'none';
}

renderAll();

// Search
const input = document.getElementById('searchInput');
let debounce;
input.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => renderAll(input.value.trim().toLowerCase()), 180);
});

// Highlight active nav on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('brand-','');
      document.querySelectorAll('.nav-chip').forEach(c => {
        c.classList.toggle('active', c.textContent.replace(/[^a-zA-Z0-9]/g,'_') === id || c.textContent === id.replace(/_/g,' '));
      });
    }
  });
}, {threshold: 0.2});

document.querySelectorAll('.brand-section').forEach(s => observer.observe(s));
</script>
